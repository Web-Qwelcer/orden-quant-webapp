<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Orden Quant · налаштування</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #17212b);
    --sec: var(--tg-theme-secondary-bg-color, #232e3c);
    --text: var(--tg-theme-text-color, #fff);
    --hint: var(--tg-theme-hint-color, #8a98a6);
    --accent: var(--tg-theme-button-color, #3390ec);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --danger: #e05b5b;
    --ok: #4cb050;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 16px 16px 40px;
    font: 16px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  h1 { font-size: 19px; margin: 4px 0 2px; }
  .sub { color: var(--hint); font-size: 13px; margin-bottom: 18px; }
  /* перемикач мови */
  .lang { display: flex; gap: 4px; flex: none; margin-top: 4px; }
  .lang button {
    background: var(--sec); color: var(--hint); border: 1px solid transparent;
    border-radius: 8px; padding: 5px 9px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .lang button.on { background: var(--accent); color: var(--accent-text); }
  .acc { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .acc.demo { background: #2d4a63; color: #9fd0f5; }
  .acc.real { background: #5a3a2d; color: #f5c79f; }
  .card { background: var(--sec); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .field-hint { color: var(--hint); font-size: 12px; font-weight: 400; margin-top: 8px; }
  .vol { color: var(--accent); font-size: 13px; font-weight: 700; margin-top: 8px; }
  .rec { color: var(--accent); font-size: 12px; font-weight: 600; margin-top: 6px; cursor: pointer; }
  .rec:active { opacity: .7; }
  /* поле-значення без стрілок-спінера */
  .valrow { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  input[type=number] {
    width: 60%; padding: 10px 12px; font-size: 22px; font-weight: 700;
    background: var(--bg); color: var(--text);
    border: 1.5px solid transparent; border-radius: 10px; outline: none;
  }
  input[type=number]:focus { border-color: var(--accent); }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  input.over { border-color: var(--danger); }
  .pct { font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  /* повзунок */
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 6px; margin: 16px 0 4px;
    background: #45525e; border-radius: 6px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid #fff;
  }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid #fff;
  }
  .ticks { position: relative; height: 16px; margin-top: 2px; }
  .ticks span { position: absolute; transform: translateX(-50%); color: var(--hint); font-size: 11px; cursor: pointer; padding: 2px 4px; white-space: nowrap; }
  .ticks span:active { color: var(--accent); }
  .row { display: flex; align-items: center; justify-content: space-between; }
  .switch { position: relative; width: 52px; height: 30px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; cursor: pointer; border-radius: 30px;
    background: #45525e; transition: .2s;
  }
  .slider:before {
    content: ""; position: absolute; height: 24px; width: 24px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .2s;
  }
  .switch input:checked + .slider { background: var(--ok); }
  .switch input:checked + .slider:before { transform: translateX(22px); }
  .warn {
    display: none; background: rgba(224,91,91,.13); border: 1px solid var(--danger);
    color: var(--danger); border-radius: 10px; padding: 10px 12px; font-size: 13px; margin-top: 10px;
  }
  .warn.show { display: block; }
  .save {
    width: 100%; padding: 15px; font-size: 17px; font-weight: 700;
    background: var(--accent); color: var(--accent-text);
    border: none; border-radius: 12px; cursor: pointer; margin-top: 6px;
  }
  .save:active { opacity: .85; }
  .saved { color: var(--ok); text-align: center; font-weight: 600; margin-top: 12px; display: none; }
</style>
</head>
<body>
  <div class="head">
    <div>
      <h1 id="t_title"></h1>
      <div class="sub" id="t_sub"></div>
    </div>
    <div class="lang">
      <button id="langUk" type="button">UK</button>
      <button id="langRu" type="button">RU</button>
    </div>
  </div>

  <div class="card">
    <div class="row" style="margin-bottom:14px">
      <span id="t_account"></span>
      <span id="accBadge" class="acc demo">demo</span>
    </div>
    <div class="row" id="balRow" style="display:none">
      <span style="color:var(--hint)" id="t_balance"></span>
      <span id="bal" style="font-weight:600"></span>
    </div>
  </div>

  <div class="card">
    <label id="t_sumLabel"></label>
    <div class="valrow">
      <input type="number" id="sum" min="0" step="1" inputmode="decimal">
      <span class="pct" id="sumPct"></span>
    </div>
    <input type="range" id="sumSlider" min="0" step="1">
    <div class="ticks" id="sumTicks"></div>
    <div class="vol" id="volPreview"></div>
    <div class="field-hint" id="t_sumHint"></div>
    <div class="rec" id="sumRec"></div>
    <div class="warn" id="sumWarn"></div>
  </div>

  <div class="card">
    <label id="t_levLabel"></label>
    <div class="valrow">
      <input type="number" id="lev" min="1" step="1" inputmode="numeric">
      <span class="pct" id="levPct"></span>
    </div>
    <input type="range" id="levSlider" min="1" step="1">
    <div class="ticks" id="levTicks"></div>
    <div class="field-hint" id="levHint"></div>
    <div class="rec" id="levRec"></div>
    <div class="warn" id="levWarn"></div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label style="margin:0" id="t_enLabel"></label>
        <div class="field-hint" style="margin-top:4px" id="enHint"></div>
      </div>
      <label class="switch"><input type="checkbox" id="enabled"><span class="slider"></span></label>
    </div>
  </div>

  <button class="save" id="saveBtn"></button>
  <div class="saved" id="savedMsg"></div>

<script>
(function () {
  var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }

  // ---- i18n (укр/рос) ----
  var I18N = {
    uk: {
      title: "⚙️ Налаштування бота",
      sub: "Бот торгує методом ICT. Тут ти задаєш <b>суму входу</b> й <b>плече</b> — метод входу та стоп не змінюються.",
      account: "Акаунт", balance: "Баланс",
      sumLabel: "💵 Сума входу (USDT)",
      sumHint: "Скільки застави (маржі) вкладаєш у вхід. Обсяг позиції = сума × плече.",
      vol: "Обсяг позиції ≈ {x}$",
      sumRec: "💡 Рекомендовано: {x}$ (≈{p}% балансу) — натисни",
      levLabel: "⚡ Плече",
      levHintCap: "Максимум для цього акаунта: {x}x.",
      levHintMax: "Біржовий максимум: {x}x.",
      levRec: "💡 Рекомендовано: {x}x — натисни",
      enLabel: "🤖 Бот увімкнений",
      enHintReal: "Real-акаунт. Реальні гроші — вмикай свідомо.",
      enHintDemo: "Коли вимкнено — нові угоди не відкриває.",
      save: "Зберегти", saved: "✅ Збережено", savedTest: "✅ Збережено (тест): ",
      pctDep: "% депозиту", pctMax: "% від макс",
      warnSum: "Стеля: максимум {x}$. Бот обріже до {x}$.",
      warnLev: "Стеля: максимум {x}x. Бот обріже до {x}x.",
      confirm: "Ти ставиш суму входу {x}$ на одну угоду{e}. Це чимало. Точно зберегти?",
      confirmOff: " (бот ВИМКНЕНО)"
    },
    ru: {
      title: "⚙️ Настройки бота",
      sub: "Бот торгует методом ICT. Здесь ты задаёшь <b>сумму входа</b> и <b>плечо</b> — метод входа и стоп не меняются.",
      account: "Аккаунт", balance: "Баланс",
      sumLabel: "💵 Сумма входа (USDT)",
      sumHint: "Сколько залога (маржи) вкладываешь во вход. Объём позиции = сумма × плечо.",
      vol: "Объём позиции ≈ {x}$",
      sumRec: "💡 Рекомендуется: {x}$ (≈{p}% баланса) — нажми",
      levLabel: "⚡ Плечо",
      levHintCap: "Максимум для этого аккаунта: {x}x.",
      levHintMax: "Биржевой максимум: {x}x.",
      levRec: "💡 Рекомендуется: {x}x — нажми",
      enLabel: "🤖 Бот включён",
      enHintReal: "Real-аккаунт. Реальные деньги — включай осознанно.",
      enHintDemo: "Когда выключено — новые сделки не открывает.",
      save: "Сохранить", saved: "✅ Сохранено", savedTest: "✅ Сохранено (тест): ",
      pctDep: "% депозита", pctMax: "% от макс",
      warnSum: "Лимит: максимум {x}$. Бот обрежет до {x}$.",
      warnLev: "Лимит: максимум {x}x. Бот обрежет до {x}x.",
      confirm: "Ты ставишь сумму входа {x}$ на одну сделку{e}. Это немало. Точно сохранить?",
      confirmOff: " (бот ВЫКЛЮЧЕН)"
    }
  };
  function fmt(s, o) { return s.replace(/\{(\w+)\}/g, function (_, k) { return (o && o[k] != null) ? o[k] : ""; }); }
  var lang = "uk";
  function T(k) { return (I18N[lang] || I18N.uk)[k]; }

  // ---- параметри від бота ----
  // account, margin, lev, enabled, bal, rec_margin, rec_lev, max_lev, sum_max [, cap_margin, cap_lev, soft_margin(real)]
  var q = new URLSearchParams(location.search);
  var account = q.get("account") || "demo";
  var hasCap  = q.has("cap_margin");
  var capMargin = parseFloat(q.get("cap_margin") || "0");
  var capLev  = parseInt(q.get("cap_lev")  || "0", 10);
  var softMargin = parseFloat(q.get("soft_margin") || "0");
  var recMargin = parseFloat(q.get("rec_margin") || "0");
  var recLev  = parseInt(q.get("rec_lev") || "5", 10);
  var maxLev  = parseInt(q.get("max_lev") || "100", 10);     // біржовий максимум (demo) / cap (real)
  var sumMax  = parseFloat(q.get("sum_max") || "0");          // верх повзунка суми входу (баланс demo / cap real)
  var bal = parseFloat(q.get("bal") || "0");

  var $ = function (id) { return document.getElementById(id); };
  var badge = $("accBadge");
  badge.textContent = account;
  badge.className = "acc " + (account === "real" ? "real" : "demo");
  if (q.get("bal") !== null && q.get("bal") !== "") { $("balRow").style.display = "flex"; $("bal").textContent = bal.toFixed(2) + " USDT"; }

  if (sumMax <= 0) sumMax = Math.max(recMargin * 4, 10);     // запобіжник, якщо баланс 0/невідомий

  // початкові значення
  $("sum").value = q.get("margin") || (recMargin > 0 ? recMargin : "");
  $("lev").value = q.get("lev") || recLev;
  $("enabled").checked = (q.get("enabled") === "1" || q.get("enabled") === "true");

  // налаштувати повзунки під межі
  var rs = $("sumSlider"), ls = $("levSlider");
  rs.max = sumMax;  rs.step = sumMax > 100 ? 1 : 0.1;
  ls.min = 1; ls.max = maxLev; ls.step = 1;

  function round2(x) { return Math.round(x * 100) / 100; }

  // мітки точно під повзунком: компенсуємо ширину «кружечка» (thumb 22px) — інакше на краях зсув
  var THUMB = 22;
  function posLeft(frac) { return "calc(" + (frac * 100) + "% + " + ((0.5 - frac) * THUMB) + "px)"; }
  function buildTicks(el, points, setVal) {   // points: [{frac, value, label}]
    el.innerHTML = "";
    points.forEach(function (pt) {
      var s = document.createElement("span");
      s.textContent = pt.label;
      s.style.left = posLeft(pt.frac);
      s.onclick = function () { setVal(pt.value); };
      el.appendChild(s);
    });
  }
  // сума входу: мітки % (позиція = той самий %), значення = % від sumMax
  buildTicks($("sumTicks"), [0, 25, 50, 75, 100].map(function (p) {
    return { frac: p / 100, value: round2(sumMax * p / 100), label: p + "%" };
  }), function (v) { $("sum").value = v; syncFromInput(); });
  // плече: мітки = РЕАЛЬНІ значення на точних позиціях (frac від min=1), щоб збігалось із повзунком
  var levMarks = [1, Math.round(maxLev * 0.25), Math.round(maxLev * 0.5), Math.round(maxLev * 0.75), maxLev]
    .filter(function (v, i, a) { return v >= 1 && a.indexOf(v) === i; });
  buildTicks($("levTicks"), levMarks.map(function (v) {
    return { frac: maxLev > 1 ? (v - 1) / (maxLev - 1) : 0, value: v, label: v + "x" };
  }), function (v) { $("lev").value = v; syncFromInput(); });

  function pctOf(v, mx) { return mx > 0 ? Math.round(v / mx * 100) : 0; }

  // ---- застосувати мову до всіх статичних + динамічних текстів ----
  function applyLang() {
    document.documentElement.lang = lang;
    $("langUk").className = lang === "uk" ? "on" : "";
    $("langRu").className = lang === "ru" ? "on" : "";
    $("t_title").textContent = T("title");
    $("t_sub").innerHTML = T("sub");
    $("t_account").textContent = T("account");
    $("t_balance").textContent = T("balance");
    $("t_sumLabel").textContent = T("sumLabel");
    $("t_sumHint").textContent = T("sumHint");
    $("t_levLabel").textContent = T("levLabel");
    $("t_enLabel").textContent = T("enLabel");
    $("saveBtn").textContent = T("save");
    // рекомендоване (клік підставляє)
    if (recMargin > 0) {
      var p = bal > 0 ? Math.round(recMargin / bal * 100) : 0;
      $("sumRec").textContent = fmt(T("sumRec"), { x: recMargin, p: p });
      $("sumRec").onclick = function () { $("sum").value = recMargin; syncFromInput(); };
    } else { $("sumRec").textContent = ""; }
    $("levRec").textContent = fmt(T("levRec"), { x: recLev });
    $("levRec").onclick = function () { $("lev").value = recLev; syncFromInput(); };
    $("levHint").textContent = hasCap ? fmt(T("levHintCap"), { x: capLev }) : fmt(T("levHintMax"), { x: maxLev });
    $("enHint").textContent = account === "real" ? T("enHintReal") : T("enHintDemo");
    if (tg && tg.MainButton) tg.MainButton.setText(T("save"));
    refresh();
  }

  function refresh() {
    var sm = parseFloat($("sum").value || "0");
    var l = parseInt($("lev").value || "0", 10) || 0;
    // % підписи: сума — % від БАЛАНСУ (депозит); плече — % від макс
    $("sumPct").textContent = bal > 0 ? (round2(sm / bal * 100) + " " + T("pctDep")) : (pctOf(sm, sumMax) + "%");
    $("levPct").textContent = pctOf(l, maxLev) + " " + T("pctMax");
    // прев'ю обсягу = сума × плече
    $("volPreview").textContent = (sm > 0 && l > 0) ? fmt(T("vol"), { x: round2(sm * l) }) : "";
    // червоніння лише коли є стеля (real)
    var hardS = hasCap && sm > capMargin, hardL = hasCap && l > capLev;
    $("sum").classList.toggle("over", hardS);
    $("lev").classList.toggle("over", hardL);
    $("sumWarn").classList.toggle("show", hardS);
    $("levWarn").classList.toggle("show", hardL);
    if (hardS) $("sumWarn").textContent = fmt(T("warnSum"), { x: capMargin });
    if (hardL) $("levWarn").textContent = fmt(T("warnLev"), { x: capLev });
  }
  function syncFromInput() {       // число → повзунок
    rs.value = Math.min(parseFloat($("sum").value || "0"), sumMax);
    ls.value = Math.min(Math.max(parseInt($("lev").value || "1", 10) || 1, 1), maxLev);
    refresh();
  }
  rs.addEventListener("input", function () { $("sum").value = round2(parseFloat(rs.value)); refresh(); });
  ls.addEventListener("input", function () { $("lev").value = parseInt(ls.value, 10); refresh(); });
  $("sum").addEventListener("input", syncFromInput);
  $("lev").addEventListener("input", syncFromInput);

  function doSave() {
    var sv = parseFloat($("sum").value || "0");
    var lv = parseInt($("lev").value || "1", 10) || 1;
    var smv = hasCap ? Math.min(sv, capMargin) : sv;
    var l = hasCap ? Math.max(1, Math.min(lv, capLev)) : Math.max(1, lv);
    var en = $("enabled").checked;
    var payload = JSON.stringify({ account: account, margin_usd: smv, leverage: l, enabled: en });

    function commit() {
      if (tg) { tg.sendData(payload); }
      else { $("savedMsg").style.display = "block"; $("savedMsg").textContent = T("savedTest") + payload; }
    }
    // перепит для високих сум — лише real
    if (hasCap && softMargin > 0 && sv >= softMargin) {
      var msg = fmt(T("confirm"), { x: sv, e: en ? "" : T("confirmOff") });
      if (tg && tg.showConfirm) { tg.showConfirm(msg, function (ok) { if (ok) commit(); }); }
      else if (confirm(msg)) commit();
    } else { commit(); }
  }

  // перемикач мови
  function setLang(l) { lang = (l === "ru") ? "ru" : "uk"; try { localStorage.setItem("orden_lang", lang); } catch (e) {} applyLang(); }
  $("langUk").onclick = function () { setLang("uk"); };
  $("langRu").onclick = function () { setLang("ru"); };

  // дефолт мови: збережений вибір → мова Telegram → укр
  var saved = null; try { saved = localStorage.getItem("orden_lang"); } catch (e) {}
  var tgLang = tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code || "";
  lang = saved || (/^ru/i.test(tgLang) ? "ru" : "uk");

  if (tg && tg.MainButton) {
    tg.MainButton.show();
    tg.MainButton.onClick(doSave);
    $("saveBtn").style.display = "none";
  }
  $("saveBtn").addEventListener("click", doSave);

  syncFromInput();
  applyLang();
})();
</script>
</body>
</html>
